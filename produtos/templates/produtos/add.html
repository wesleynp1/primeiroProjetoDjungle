{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>DJungle here I go!</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link href="{% static "produtos/css/estiloBase.css" %}" rel="stylesheet">
    <title>Title</title>
</head>
<body>
    <h1 class="text-center">WELLCOME MY PYTHON SITE</h1>

    <h2 class="text-center">Cadastrar um produto</h2>
    <form action={% url "produtos:add" %} method="post" id="formularioCadastroProduto" class="d-flex align-items-center flex-column Form-with-input-BRL">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome do produto</label>
            <input type="text" name="nome" placeholder="Ex.: Celular Marca Tal"  class="form-control" id="nome" required>
        </div>

        <div class="mb-3">
            <label for="preco">Preço do produto</label>
            <input type="text" name="preco" value="0" placeholder="Ex.: R$ 2.000,00" class="form-control input-BRL" required>
        </div>
        
        <input type="submit" value="CADASTRAR" class="btn btn-primary">

        <a href="{% url "produtos:index" %}" class="btn btn-primary mt-4">voltar</a>

        {% csrf_token %}
    </form>
</body>
    <style src="{% static "produtos/css/estiloBase.css" %}"></style>
<script src={% static "produtos/js/inputPreco.js" %}></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
</html>
