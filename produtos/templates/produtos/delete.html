{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>DJungle here I go!</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link href="{% static "produtos/css/estiloBase.css" %}" rel="stylesheet">
    <title>Title</title>
</head>
<body>
    <h1 class="text-center">WELLCOME MY PYTHON SITE</h1>

    <h2 class="text-center">Deletar este produto?</h2>

    <form action={%  url "produtos:delete" produto.id %} method="post" id="formularioCadastroProduto" class="d-flex align-items-center flex-column">
        <p class="center"> Excluir {{ produto.nome }}, custando {{ produto.preco_formatado }}?</p>
        
        <div>
            <input type="submit" value="DELETAR" class="btn btn-danger">
        </div>

        <a href="{% url "produtos:index" %}" class="btn btn-primary mt-4">voltar</a>
        
        {% csrf_token %}
    </form>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
</html>
