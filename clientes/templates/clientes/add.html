{% extends "base.html" %}
{% block title %}Vendas{% endblock %}

{% block content %}
    <h2>Registro de Novo Cliente</h2>

    <form method="POST" action="{% url 'clientes:add' %}" class="d-flex flex-column p-1 m-1">

        <div class="mb-3">
            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome" class="form-control">
        </div>

        <div class="mb-3">
            <label for="cpf">CPF:</label>
            <input type="text" name="cpf" id="cpf" placeholder="apenas números" class="form-control" maxlength="11" pattern="[0-9]{11}" required>
        </div>

        <div class="mb-3">
            <label for="telefone">Telefone</label>
            <input type="text" name="telefone" id="telefone" class="form-control" maxlength="11" pattern="[0-9]{11}">
        </div>

        {% csrf_token %}

        <input type="submit" value="REGISTRAR" class="btn btn-primary">
    </form>
{% endblock %}
